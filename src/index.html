                                        <p class="card__description body-regular-light-fluid _y">
                                            GENOTEST VTM HPV is a liquid medium in a specialized
                                            tube designed for the storage and transportation of
                                            Human Papillomavirus (HPV) clinical samples.
                                            <span class="card__description-extra">
                                                Its primary purpose is to preserve samples,
